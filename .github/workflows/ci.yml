name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Install WebAssembly native toolchain
        run: dotnet workload install wasm-tools
      - name: Restore
        run: dotnet restore Unpdf.slnx
      - name: Build
        run: dotnet build Unpdf.slnx --configuration Release --no-restore
      - name: Test release tooling
        run: python3 -m unittest discover -s tests/release -p 'test_*.py'
      - name: Test conversion quality tooling
        run: python3 -m unittest discover -s tests/conversion_quality -p 'test_*.py'
      - name: Publish browser-wasm application
        run: >-
          dotnet publish
          samples/PdfBox.Net.Html.Wasm/PdfBox.Net.Html.Wasm.csproj
          --configuration Release
          --no-restore
          --output artifacts/wasm-publish
      - name: Harden browser hosting output
        run: python3 eng/harden_wasm_site.py --root artifacts/wasm-publish/wwwroot
      - name: Verify browser hosting policy
        run: python3 eng/harden_wasm_site.py --root artifacts/wasm-publish/wwwroot --check
      - name: Install Playwright browser
        run: >-
          tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/node/linux-x64/node
          tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/package/cli.js
          install --with-deps chromium
      - name: Test
        env:
          UNPDF_WASM_PUBLISHED_ROOT: ${{ github.workspace }}/artifacts/wasm-publish/wwwroot
        run: dotnet test Unpdf.slnx --configuration Release --no-build --nologo
      - name: Test deterministic browser-wasm conversion
        env:
          UNPDF_WASM_PUBLISHED_ROOT: ${{ github.workspace }}/artifacts/wasm-publish/wwwroot
        run: >-
          dotnet test
          tests/PdfBox.Net.Html.Tests/PdfBox.Net.Html.Tests.csproj
          --configuration Release
          --no-build
          --nologo
          --filter
          'FullyQualifiedName~WasmBrowserSmokeTest.BrowserLite_UploadedPdf_IsConvertedWithoutNetworkRequests'
          --logger 'console;verbosity=detailed'
      - name: Verify single-file CLI
        run: eng/verify-unpdf-single-file.sh linux-x64
      - name: Verify NativeAOT CLI
        run: eng/verify-unpdf-nativeaot.sh linux-x64
      - name: Check browser payload budget
        run: |
          status=0
          python3 eng/wasm_payload_report.py \
            --publish-directory artifacts/wasm-publish/wwwroot \
            --baseline eng/wasm-payload-baseline.json \
            --json artifacts/wasm-payload/payload-report.json \
            --markdown artifacts/wasm-payload/payload-report.md || status=$?
          if test -f artifacts/wasm-payload/payload-report.md; then
            cat artifacts/wasm-payload/payload-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"
      - name: Upload browser payload report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-payload-report
          path: artifacts/wasm-payload
          if-no-files-found: warn
