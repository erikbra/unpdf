name: Full HTML artifacts

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: full-html-artifacts
  cancel-in-progress: true

env:
  ARTIFACT_NAME: full-html-artifacts

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Build artifact generator
        run: >-
          dotnet build
          tools/conversion_quality/PdfBox.Net.ConversionQuality/PdfBox.Net.ConversionQuality.csproj
          --configuration Release

      - name: Install Playwright browser
        run: >-
          tools/conversion_quality/PdfBox.Net.ConversionQuality/bin/Release/net10.0/.playwright/node/linux-x64/node
          tools/conversion_quality/PdfBox.Net.ConversionQuality/bin/Release/net10.0/.playwright/package/cli.js
          install --with-deps chromium

      - name: Download Ghent test PDFs
        run: >-
          tools/conversion_quality/PdfBox.Net.ConversionQuality/bin/Release/net10.0/.playwright/node/linux-x64/node
          scripts/download-ghent-pdf.mjs
          artifacts/external-pdf-samples/ghent
          --test-pages
          --playwright-package=tools/conversion_quality/PdfBox.Net.ConversionQuality/bin/Release/net10.0/.playwright/package

      - name: Generate full HTML artifact suite
        run: python3 tools/conversion_quality/run_remote_corpus.py

      - name: Upload HTML artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/html-examples
          if-no-files-found: error
          retention-days: 30

      - name: Retain only the latest artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\" and .workflow_run.id != ${GITHUB_RUN_ID}) | .id" |
          while read -r artifact_id; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
          done
