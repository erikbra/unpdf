name: Publish PDF-to-HTML WASM Preview

on:
  push:
    branches:
      - main
    paths:
      - ".github/actions/restore-pages-site/**"
      - ".github/workflows/publish-wasm-pages.yml"
      - "Directory.Packages.props"
      - "eng/publish_wasm_pages_site.py"
      - "eng/wasm-payload-baseline.json"
      - "eng/wasm_payload_report.py"
      - "packaging/pages/**"
      - "samples/PdfBox.Net.Html.Wasm/**"
      - "src/PdfBox.Net/**"
      - "src/PdfBox.Net.FontBox/**"
      - "src/PdfBox.Net.Html/**"
      - "src/PdfBox.Net.IO/**"
      - "src/PdfBox.Net.Layout/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: unpdf-pages-publication
  cancel-in-progress: false

env:
  PAGES_BASE_URL: https://erikbra.github.io/unpdf
  WASM_BASE_PATH: /unpdf/wasm/

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Install WebAssembly native toolchain
        run: dotnet workload install wasm-tools

      - name: Publish adaptive browser application
        run: >-
          dotnet publish
          samples/PdfBox.Net.Html.Wasm/PdfBox.Net.Html.Wasm.csproj
          --configuration Release
          --output artifacts/wasm-publish

      - name: Check browser payload budget
        run: |
          status=0
          python3 eng/wasm_payload_report.py \
            --publish-directory artifacts/wasm-publish/wwwroot \
            --baseline eng/wasm-payload-baseline.json \
            --json artifacts/wasm-payload/payload-report.json \
            --markdown artifacts/wasm-payload/payload-report.md || status=$?
          if test -f artifacts/wasm-payload/payload-report.md; then
            cat artifacts/wasm-payload/payload-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"

      - name: Upload browser payload report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-payload-report
          path: artifacts/wasm-payload
          if-no-files-found: warn

      - uses: ./.github/actions/restore-pages-site
        with:
          github-token: ${{ github.token }}

      - name: Merge application into Pages tree
        run: >-
          python3 eng/publish_wasm_pages_site.py
          --application artifacts/wasm-publish/wwwroot
          --site artifacts/pages
          --landing-page packaging/pages/index.html
          --not-found-page packaging/pages/404.html
          --base-path "$WASM_BASE_PATH"

      - name: Verify staged site
        run: |
          grep -F '<base href="/unpdf/wasm/"' artifacts/pages/wasm/index.html
          grep -F 'PdfBox.Net' artifacts/pages/index.html
          if grep -Fq 'PdfBox.Net.Html.Wasm.styles.css' artifacts/pages/wasm/index.html; then
            echo "Published index references a missing scoped CSS bundle" >&2
            exit 1
          fi
          test -n "$(find artifacts/pages/wasm/_framework -maxdepth 1 -name 'blazor.webassembly.*.js' -type f -print -quit)"
          test -n "$(find artifacts/pages/wasm/_framework -maxdepth 1 -name 'dotnet.native.*.wasm' -type f -print -quit)"
          test -f artifacts/pages/wasm/samples/hello.pdf
          test -f artifacts/pages/apt/index.html

      - name: Record Pages update
        id: publish
        run: |
          echo "root_sha256=$(sha256sum artifacts/pages/index.html | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "wasm_sha256=$(sha256sum artifacts/pages/wasm/index.html | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          framework_wasm="$(find artifacts/pages/wasm/_framework -maxdepth 1 -name 'dotnet.native.*.wasm' -type f -print -quit)"
          test -n "$framework_wasm"
          echo "framework_wasm=${framework_wasm#artifacts/pages/wasm/}" >> "$GITHUB_OUTPUT"

      - name: Save assembled Pages site
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pages-site-state
          path: artifacts/pages
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
          overwrite: true

      - name: Retain only the latest Pages state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"pages-site-state\" and .workflow_run.id != ${GITHUB_RUN_ID}) | .id" |
          while read -r artifact_id; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: artifacts/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Wait for GitHub Pages deployment
        env:
          ROOT_SHA256: ${{ steps.publish.outputs.root_sha256 }}
          WASM_SHA256: ${{ steps.publish.outputs.wasm_sha256 }}
        run: |
          for _ in $(seq 1 60); do
            root_sha="$(curl -fsS "$PAGES_BASE_URL/?run=$GITHUB_RUN_ID" | sha256sum | cut -d' ' -f1 || true)"
            wasm_sha="$(curl -fsS "$PAGES_BASE_URL/wasm/?run=$GITHUB_RUN_ID" | sha256sum | cut -d' ' -f1 || true)"
            if test "$root_sha" = "$ROOT_SHA256" && test "$wasm_sha" = "$WASM_SHA256"; then
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Pages did not publish the expected WASM site within ten minutes" >&2
          exit 1

      - name: Verify public assets
        env:
          FRAMEWORK_WASM: ${{ steps.publish.outputs.framework_wasm }}
        run: |
          curl -fsS "$PAGES_BASE_URL/wasm/samples/hello.pdf" -o "$RUNNER_TEMP/hello.pdf"
          grep -a -q '%PDF-' "$RUNNER_TEMP/hello.pdf"
          content_type="$(curl -fsSI "$PAGES_BASE_URL/wasm/$FRAMEWORK_WASM" | tr -d '\r' | awk -F': ' 'tolower($1) == "content-type" { print tolower($2) }')"
          case "$content_type" in
            application/wasm*) ;;
            *) echo "Unexpected WebAssembly content type: $content_type" >&2; exit 1 ;;
          esac
