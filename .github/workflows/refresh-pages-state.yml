name: Refresh Pages state

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: unpdf-pages-publication
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: ./.github/actions/restore-pages-site
        with:
          github-token: ${{ github.token }}

      - name: Save assembled Pages site
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pages-site-state
          path: artifacts/pages
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
          overwrite: true

      - name: Retain only the latest Pages state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"pages-site-state\" and .workflow_run.id != ${GITHUB_RUN_ID}) | .id" |
          while read -r artifact_id; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: artifacts/pages

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
