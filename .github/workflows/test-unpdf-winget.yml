name: Test unpdf WinGet Package

on:
  pull_request:
    paths:
      - ".github/workflows/test-unpdf-winget.yml"
      - "eng/update_winget_manifests.py"
      - "eng/build_unpdf_release.py"
      - "apps/PdfBox.Net.Unpdf/**"
      - "packaging/winget/**"
      - "tests/release/test_update_winget_manifests.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Build and serve current Windows release artifact
        shell: pwsh
        run: |
          python eng/build_unpdf_release.py --version 4.0.0-preview.1 --rid win-x64 `
            --output artifacts/unpdf-release --signing-status unsigned-preview
          $archive = Get-ChildItem artifacts/unpdf-release/unpdf-*.zip | Select-Object -First 1
          $manifest = @{
            version = "4.0.0-preview.1"
            artifacts = @(@{
              rid = "win-x64"
              url = "http://127.0.0.1:8765/$($archive.Name)"
              sha256 = (Get-FileHash $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            })
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content artifacts/release-manifest.json
          Start-Process python -ArgumentList "-m", "http.server", "8765", "--directory", "artifacts/unpdf-release"

      - name: Generate preview manifests
        shell: pwsh
        run: |
          python eng/update_winget_manifests.py `
            --manifest "artifacts/release-manifest.json" `
            --output "artifacts/winget-manifests"

      - name: Validate manifests
        shell: pwsh
        run: |
          winget --version
          winget validate --manifest artifacts/winget-manifests

      - name: Install local manifest
        shell: pwsh
        run: |
          winget settings --enable LocalManifestFiles
          winget install --manifest artifacts/winget-manifests `
            --accept-package-agreements --accept-source-agreements --disable-interactivity
          New-Item -ItemType File artifacts/winget-installed | Out-Null

      - name: Smoke-test installed command
        shell: pwsh
        run: |
          $command = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Links\unpdf.exe"
          if (-not (Test-Path $command)) { throw "WinGet did not create the unpdf command link" }
          & $command --version
          & $command tests/SharedFixtures/classic-xref-fixture.pdf `
            --output artifacts/winget-smoke --quiet
          if (-not (Select-String -Path artifacts/winget-smoke/index.html -Pattern "Hello" -Quiet)) {
            throw "Installed unpdf did not produce expected fixture HTML"
          }

      - name: Uninstall and verify cleanup
        if: ${{ always() }}
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/winget-installed)) {
            Write-Host "Install did not complete; no WinGet package to remove."
            exit 0
          }
          winget uninstall --manifest artifacts/winget-manifests `
            --accept-source-agreements --disable-interactivity
          $command = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Links\unpdf.exe"
          if (Test-Path $command) { throw "WinGet left the unpdf command link after uninstall" }
