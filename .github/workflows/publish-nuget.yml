name: Publish conversion NuGet packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Full SemVer package version
        required: true
        type: string
      publish:
        description: Push packages to NuGet.org
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Unpdf.slnx
      - run: dotnet build Unpdf.slnx --configuration Release --no-restore
      - run: dotnet test Unpdf.slnx --configuration Release --no-build --nologo
      - name: Pack conversion libraries
        run: |
          dotnet pack src/PdfBox.Net.Layout/PdfBox.Net.Layout.csproj --configuration Release --no-build --output artifacts/packages -p:Version="${{ inputs.version }}"
          dotnet pack src/PdfBox.Net.Html/PdfBox.Net.Html.csproj --configuration Release --no-build --output artifacts/packages -p:Version="${{ inputs.version }}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: conversion-packages-${{ inputs.version }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
  publish:
    if: ${{ inputs.publish }}
    needs: pack
    runs-on: ubuntu-latest
    environment: nuget.org
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: conversion-packages-${{ inputs.version }}
          path: artifacts/packages
      - uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}
      - run: dotnet nuget push 'artifacts/packages/*.nupkg' --api-key '${{ steps.login.outputs.NUGET_API_KEY }}' --source https://api.nuget.org/v3/index.json --skip-duplicate
